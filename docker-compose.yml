services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: leakguard
      POSTGRES_PASSWORD: leakguard
      POSTGRES_DB: leakguard
    ports:
      - "5432:5432"
    volumes:
      - ./infra/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  case-service:
    build: ./apps/case-service
    environment:
      PORT: "8083"
      DATABASE_URL: "postgres://leakguard:leakguard@postgres:5432/leakguard?sslmode=disable"
    depends_on:
      - postgres

  rules-service:
    build: ./apps/rules-service
    environment:
      PORT: "8082"

  ingestion-service:
    build: ./apps/ingestion-service
    environment:
      PORT: "8081"
      DATABASE_URL: "postgres://leakguard:leakguard@postgres:5432/leakguard?sslmode=disable"
      RULES_SERVICE_URL: "http://rules-service:8082"
      CASE_SERVICE_URL: "http://case-service:8083"
      ANOMALY_SERVICE_URL: "http://anomaly-service:8090"
      TENANT_ID: "demo-tenant"
      REDIS_ADDR: "redis:6379"
      ASYNQ_QUEUE_CRITICAL: "critical"
      ASYNQ_QUEUE_DEFAULT: "default"
      ASYNQ_QUEUE_LOW: "low"
      WORKER_CONCURRENCY: "10"
      DLQ_MAX_RETRY: "10"
      MIN_BACKOFF_SECS: "5"
      MAX_BACKOFF_SECS: "30"
    depends_on:
      - postgres
      - redis
      - rules-service
      - case-service

  anomaly-service:
    build: ./apps/anomaly-service
    environment:
      PORT: "8090"
      REASONING_ENABLED: "true"
      CASE_SERVICE_URL: "http://case-service:8083"
      VERTEX_PROJECT_ID: "${VERTEX_PROJECT_ID}"
      VERTEX_LOCATION: "${VERTEX_LOCATION:-asia-southeast1}"
      VERTEX_MODEL: "${VERTEX_MODEL:-gemini-2.5-pro}"
      BASE_CURRENCY: "MYR"

  api-gateway:
    build: ./apps/api-gateway
    environment:
      PORT: "8080"
      INGESTION_URL: "http://ingestion-service:8081"
      CASES_URL: "http://case-service:8083"
      CORS_ORIGIN: "http://localhost:5173"
    ports:
      - "8080:8080"
    depends_on:
      - ingestion-service
      - case-service

  web-dashboard:
    build: ./apps/web-dashboard
    environment:
      PORT: "5173"
    ports:
      - "5173:5173"
    depends_on:
      - api-gateway
